# AMD GPU JupyterHub Configuration
# Requires: AMD GPU Operator installed on cluster
# Image: Aidas-dev/jupyter-quant-kubernetes:amd

singleuser:
  image:
    name: Aidas-dev/jupyter-quant-kubernetes
    tag: amd
  cpu:
    limit: 8
    guarantee: 4
  memory:
    limit: 32G
    guarantee: 16G
  extraResource:
    limits:
      amd.com/gpu: 1
  nodeSelector:
    amd.com/gpu.product: "mi300"  # Adjust based on your GPU type
  storage:
    type: dynamic
    capacity: 50Gi
  profileList:
    - display_name: "1 GPU (MI300)"
      description: "Single AMD MI300 GPU for model training"
      kubespawner_override:
        extraResource:
          limits:
            amd.com/gpu: 1
        nodeSelector:
          amd.com/gpu.product: "mi300"
    - display_name: "2 GPUs (MI300)"
      description: "Dual AMD MI300 GPUs for large models"
      kubespawner_override:
        extraResource:
          limits:
            amd.com/gpu: 2
        memory:
          limit: 64G
          guarantee: 32G
        nodeSelector:
          amd.com/gpu.product: "mi300"
    - display_name: "4 GPUs (MI300)"
      description: "Multi-GPU for distributed training"
      kubespawner_override:
        extraResource:
          limits:
            amd.com/gpu: 4
        memory:
          limit: 128G
          guarantee: 64G
        cpu:
          limit: 32
          guarantee: 16
        nodeSelector:
          amd.com/gpu.product: "mi300"
