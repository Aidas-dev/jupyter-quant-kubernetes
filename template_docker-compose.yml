# Docker Compose template for local testing
# For production, use JupyterHub on Kubernetes
# See: https://z2jh.jupyter.org/en/stable/
# Image: Aidas-dev/jupyter-quant-kubernetes
#
# Based on the original jupyter-quant by @gnzsnz:
# https://github.com/quantbelt/jupyter-quant

services:
  jupyter-quant:
    build:
      context: .
      args:
        USER: ${USER}
        USER_ID: ${USER_ID}
        USER_GID: ${USER_GID}
        IMG_PYTHON_VERSION: ${IMG_PYTHON_VERSION}
        APT_PROXY: ${APT_PROXY}
        IMAGE_VERSION: ${IMAGE_VERSION}
    image: Aidas-dev/jupyter-quant-kubernetes:${IMAGE_VERSION}
    environment:
      APT_PROXY: ${APT_PROXY}
      BYODF: ${BYODF:-}
      SSH_KEYDIR: ${SSH_KEYDIR:-}
      TZ: ${QUANT_TZ:-}
    restart: unless-stopped
    ports:
      - ${LISTEN_PORT}:8888
    volumes:
      - quant_conf:/home/${USER}/.config
      - quant_data:/home/${USER}/.local
      - ${PWD}/Notebooks:/home/${USER}/Notebooks

volumes:
  quant_conf:
  quant_data:
