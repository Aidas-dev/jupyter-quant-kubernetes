name: Publish Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: Aidas-dev/jupyter-quant-kubernetes
  GH_IMAGE_NAME: ghcr.io/aidas-dev/jupyter-quant-kubernetes

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.variant.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: CPU
            dockerfile: ./Dockerfile
            suffix: ""
          - name: NVIDIA GPU
            dockerfile: ./Dockerfile.nvidia
            suffix: "-nvidia"
          - name: AMD GPU
            dockerfile: ./Dockerfile.amd
            suffix: "-amd"
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.variant.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.GH_IMAGE_NAME }}:${{ steps.version.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.GH_IMAGE_NAME }}:latest${{ matrix.variant.suffix }}
          build-args: |
            USER=${{ vars.USER || 'gordon' }}
            USER_ID=${{ vars.USER_ID || '1000' }}
            USER_GID=${{ vars.USER_GID || '1000' }}
            IMG_PYTHON_VERSION=${{ vars.IMG_PYTHON_VERSION || '3.12' }}
            IMAGE_VERSION=${{ steps.version.outputs.version }}
